
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible Energy | Ops Hub</title>
    <style>
        :root { 
            --up: #00ff88; 
            --down: #ff3333; 
            --cyan: #00d4ff; 
            --bg: #05070a; 
            --card-bg: rgba(255,255,255,0.02);
        }

        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            margin: 0;
            overflow-x: hidden;
        }

        /* Header Styles */
        .header { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 1px solid #111; 
            padding: 20px; 
            align-items: center;
        }

        .header h1 { 
            color: var(--cyan); 
            margin: 0; 
            letter-spacing: 2px; 
            font-size: 24px;
        }

        #clock { 
            color: var(--up); 
            font-family: monospace; 
            font-size: 20px;
            text-shadow: 0 0 10px rgba(0,255,136,0.3);
        }

        /* Dashboard Grid */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 20px; 
            padding: 20px;
            margin-bottom: 100px; /* Space for ticker */
        }

        /* Card Styles */
        .card { 
            background: var(--card-bg); 
            border: 1px solid #222; 
            border-radius: 15px; 
            padding: 25px; 
            cursor: pointer; 
            position: relative; 
            transition: all 0.3s ease;
        }

        .card:hover { 
            border-color: var(--cyan); 
            transform: translateY(-5px); 
            background: rgba(0,212,255,0.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .tick { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            font-weight: bold; 
            font-size: 22px; 
        }

        .price { 
            font-size: 32px; 
            font-weight: bold; 
            margin: 10px 0; 
            color: #fff;
        }

        .tag {
            font-size: 11px; 
            color: #888; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .desc {
            font-size: 13px; 
            color: #aaa;
            line-height: 1.4;
        }

        /* Risk Bar */
        .risk-bar { 
            width: 100%; 
            height: 6px; 
            background: #111; 
            margin-top: 15px; 
            border-radius: 10px;
            overflow: hidden;
        }

        .risk-fill { 
            height: 100%; 
            border-radius: 10px;
            transition: width 1s ease-in-out;
        }

        /* News Ticker Styles */
        .ticker-wrap {
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%;
            background: rgba(0, 0, 0, 0.9); 
            border-top: 1px solid var(--cyan);
            padding: 12px 0; 
            overflow: hidden;
            z-index: 1000;
        }

        .ticker {
            display: inline-block; 
            white-space: nowrap;
            animation: ticker 35s linear infinite;
            color: var(--cyan); 
            font-family: monospace; 
            font-weight: bold;
            font-size: 14px;
        }

        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .ticker span { margin-right: 60px; }

    </style>
</head>
<body>

    <div class="header">
        <h1>INVINCIBLE <span style="color:white">ENERGY</span></h1>
        <div id="clock">00:00:00</div>
    </div>

    <div id="dashboard" class="grid"></div>

    <div class="ticker-wrap">
        <div class="ticker">
            <span>⚡ SYSTEM STATUS: OPTIMAL</span>
            <span>📊 MARKET ALERT: STC PRICES HOLDING AT $39.65</span>
            <span>🔥 GRID UPDATE: NSW RENEWABLE PENETRATION AT 48%</span>
            <span>🛡️ OPS INTEL: LEAD-TO-INSTALL TIME REDUCED TO 8.4 DAYS</span>
            <span>🚀 INVINCIBLE HQ: AUTOMATION ENGINE v2.0 ACTIVE</span>
        </div>
    </div>

    <script>
        // Function to fetch data from the JSON file created by scraper.py
        async function loadDashboard() {
            try {
                // We add ?v= + Date.now() to make sure the browser doesn't show old data
                const res = await fetch('data/market_data.json?v=' + Date.now());
                const data = await res.json();
                
                const container = document.getElementById('dashboard');
                
                container.innerHTML = data.map(item => `
                    <div class="card" onclick="window.location.href='${item.file}'">
                        <div class="tick" style="color: ${item.trend === 'up' ? 'var(--up)' : 'var(--down)'}">
                            ${item.trend === 'up' ? '✓' : '✕'}
                        </div>
                        <div class="tag">${item.tag}</div>
                        <div class="price">${item.title}</div>
                        <p class="desc">${item.desc}</p>
                        <div class="risk-bar">
                            <div class="risk-fill" style="width: ${item.risk}%; background: ${item.risk > 70 ? 'var(--down)' : 'var(--cyan)'}"></div>
                        </div>
                        <div style="font-size:9px; color:#444; margin-top:10px;">DEEP DIVE →</div>
                    </div>
                `).join('');
            } catch (error) {
                console.log("Waiting for data file to sync...", error);
            }
        }

        // Clock Function
        setInterval(() => { 
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString(); 
        }, 1000);

        // Run the load function when page opens
        loadDashboard();

        // Auto-refresh the data every 10 minutes (600,000 milliseconds)
        setInterval(loadDashboard, 600000);
    </script>
</body>
</html>
