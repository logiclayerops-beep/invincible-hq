<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible Energy | Live Ops Portal</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --solar-gold: #ffcc00;
            --bg-dark: #0a0e14;
            --card-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1a2a3a, #0a0e14);
            color: #ffffff;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
        }

        .container { max-width: 900px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .logo-area h1 { margin: 0; font-size: 24px; letter-spacing: 2px; color: var(--neon-blue); }
        .logo-area span { font-size: 12px; color: #888; text-transform: uppercase; }

        .sync-box { text-align: right; }
        #timer { font-family: monospace; color: var(--solar-gold); font-size: 18px; font-weight: bold; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--neon-blue);
            padding: 20px;
            border-radius: 8px;
            transition: transform 0.2s, border-color 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--neon-blue);
            background: rgba(255, 255, 255, 0.08);
        }

        .tag {
            font-size: 10px;
            background: rgba(0, 212, 255, 0.2);
            color: var(--neon-blue);
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            font-weight: bold;
        }

        h3 { margin: 15px 0 10px 0; color: #fff; }
        p { font-size: 14px; color: #ccc; line-height: 1.5; }
        
        .status-dot {
            height: 8px;
            width: 8px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
            box-shadow: 0 0 8px #00ff00;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-area">
            <h1>INVINCIBLE ENERGY</h1>
            <span><span class="status-dot"></span> Australia Operations Hub</span>
        </div>
        <div class="sync-box">
            <div style="font-size: 10px; color: #888;">NEXT DATA UPDATE</div>
            <div id="timer">10:00</div>
        </div>
    </header>

    <div id="display" class="grid">
        <p>Connecting to AEMO Data Streams...</p>
    </div>
</div>

<script>
    let timeLeft = 600; 

    function updateTimer() {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        
        if (timeLeft <= 0) {
            loadIntel();
            timeLeft = 600;
        } else {
            timeLeft--;
        }
    }

    async function loadIntel() {
        try {
            // Using ?cache-bust to ensure we don't get old data
            const res = await fetch('data/market_data.json?t=' + Date.now());
            const data = await res.json();
            const container = document.getElementById('display');

            container.innerHTML = data.map(item => `
                <div class="card">
                    <span class="tag">${item.tag}</span>
                    <h3>${item.title}</h3>
                    <p>${item.desc}</p>
                    <div style="margin-top:15px; font-size:12px; color: var(--solar-gold);">
                        ${item.details}
                    </div>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('display').innerHTML = "<p>Data Offline. Check Scraper status.</p>";
        }
    }

    setInterval(updateTimer, 1000);
    loadIntel();
</script>

</body>
</html>
