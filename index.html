<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible Energy | Global Ops</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --up: #00ff88; --down: #ff4d4d; --bg: #06080a; }
        body { background: var(--bg); color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
        .card { 
            background: rgba(255,255,255,0.02); border: 1px solid #1a1a1a; 
            border-radius: 15px; padding: 25px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: #00d4ff; background: rgba(255,255,255,0.05); transform: translateY(-5px); }
        .up { color: var(--up); } .down { color: var(--down); }
        .price { font-size: 32px; font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>
    <h1 style="text-align:center; letter-spacing:4px;">INVINCIBLE <span style="color:#00d4ff">ENERGY</span></h1>
    <div id="display" class="grid"></div>

    <script>
        async function load() {
            const res = await fetch('data/market_data.json?t=' + Date.now());
            const data = await res.json();
            const container = document.getElementById('display');
            
            container.innerHTML = data.map((item, i) => `
                <div class="card" onclick="window.location.href='${item.file}'">
                    <div style="float:right" class="${item.trend}">${item.trend === 'up' ? '✓' : '✕'}</div>
                    <div style="font-size:10px; color:#888;">${item.tag}</div>
                    <div class="price">${item.title}</div>
                    <p style="font-size:13px; color:#aaa;">${item.desc}</p>
                    <div style="font-size:10px; color:#444; border-top:1px solid #111; padding-top:10px;">DEEP DIVE →</div>
                </div>
            `).join('');
        }
        load();
    </script>
</body>
</html>
