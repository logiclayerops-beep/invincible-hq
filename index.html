
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invincible Energy | AI</title>
    <style>
        body { background: #050a18; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .logo { 
            width: 100px; height: 100px; margin: 0 auto; border-radius: 50%; border: 3px solid #ffd700;
            background: url('https://api.dicebear.com/9.x/initials/svg?seed=IE&backgroundColor=050a18&fontColor=ffd700') center/cover;
        }
        .card { background: #0a1329; padding: 20px; border-radius: 15px; margin-top: 20px; border-left: 5px solid #ffd700; }
        .tag { color: #ffd700; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="logo"></div>
    <h1>INVINCIBLE ENERGY</h1>
    <div id="display">Awaiting AI Sync...</div>

    <script>
        async function loadIntel() {
            try {
                const res = await fetch('data/market_data.json?t=' + Date.now());
                const data = await res.json();
                const container = document.getElementById('display');
                
                if (data.length > 0) {
                    container.innerHTML = data.map(item => `
                        <div class="card">
                            <div class="tag">[ ${item.tag} ]</div>
                            <h3>${item.title}</h3>
                            <p>${item.desc}</p>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Sync Error", e); }
        }
        setInterval(loadIntel, 5000);
        loadIntel();
    </script>
</body>
</html>
