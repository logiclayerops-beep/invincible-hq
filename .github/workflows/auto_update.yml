
          
name: Invincible Sync
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Run Scraper
        run: python scraper.py
        
      - name: Push Changes
        run: |
          git config --global user.name "AI-Agent"
          git config --global user.email "agent@invincible.energy"
          git add data/market_data.json
          git commit -m "Update Market Intel [Skip CI]" || exit 0
          git push
          
